<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Immatech - PS5 Pro Repair Guide</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        /* Interface Style Rose */
        .ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }
 
        .ui-button {
            padding: 12px 20px;
            background: rgba(255, 20, 147, 0.2);
            color: #ff69b4;
            border: 1px solid #ff1493;
            border-radius: 8px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }
 
        .ui-button:hover {
            background: #ff1493;
            color: #fff;
            box-shadow: 0 0 15px #ff1493;
        }
 
        #info-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 0, 10, 0.95);
            color: #ff69b4;
            padding: 20px;
            border-radius: 10px;
            font-family: sans-serif;
            display: none;
            border-left: 5px solid #ff1493;
            min-width: 280px;
            max-width: 350px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.4);
            z-index: 100;
        }
 
        #info-display h3 { margin: 0 0 10px 0; color: #ff1493; text-transform: uppercase; }
        #info-text { color: #ffb6c1; line-height: 1.5; white-space: pre-line; }
       
        .close-btn {
            background: none;
            border: 1px solid #ff1493;
            color: #ff1493;
            cursor: pointer;
            margin-top: 15px;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
 
    <div class="ui-container">
        <button class="ui-button" onclick="showInstructions('AIDE', 'Cliquez sur les points roses pour voir les étapes de réparation.')">❓ Aide</button>
        <button class="ui-button" id="reset-btn">🔄 Reset Vue</button>
    </div>
 
    <div id="info-display">
        <h3 id="info-title">Analyse...</h3>
        <p id="info-text"></p>
        <button class="close-btn" onclick="document.querySelector('#info-display').style.display='none'">FERMER</button>
    </div>
 
    <a-scene background="color: #121212" renderer="antialias: true; colorManagement: true;" vr-mode-ui="enabled: false">
       
        <a-assets>
            <a-asset-item id="ps5" src="assets/ps5.glb"></a-asset-item>
            <audio id="snd-click" src="assets/click.mp3"></audio>
        </a-assets>
 
        <a-camera position="0 0 1.2" fov="45" look-controls-enabled="false" wasd-controls-enabled="false"></a-camera>
 
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 3 2" intensity="1"></a-light>
 
        <a-entity id="controller-group">
            <a-entity id="controller" gltf-model="#ps5" position="0 0 0" scale="8 8 8"></a-entity>
 
            <a-sphere class="hotspot" data-id="joystick"
                      position="-0 0.22.5 -0.21" radius="0.03"
                      color="#ff1493" material="emissive: #ff1493 ;">
            </a-sphere>
           
            <a-sphere class="hotspot" data-id="buttons"
                      position="0.30 0.22.5 -0.13.5" radius="0.03"
                      color="#ff1493" material="emissive: #ff1493; emissiveIntensity: 2">
            </a-sphere>
 
            <a-sphere class="hotspot" data-id="touchpad"
                      position="0.11 0.18 -0.08" radius="0.03"
                      color="#ff1493" material="emissive: #ff1493; emissiveIntensity: 2">
            </a-sphere>
        </a-entity>
 
    </a-scene>
 
    <script>
        const scene = document.querySelector('a-scene');
       
        scene.addEventListener('loaded', () => {
            const controllerGroup = document.querySelector('#controller-group');
            const camera = document.querySelector('a-camera');
            const canvas = scene.canvas;
            const sndClick = document.querySelector('#snd-click');
 
            const repairGuides = {
                'joystick': {
                    title: 'Réparer le Drift',
                    text: '• Symptôme : Mouvement fantôme.\n• Solution : Nettoyer le mécanisme au nettoyant contact ou remplacer le potentiomètre.'
                },
                'buttons': {
                    title: 'Boutons Bloqués',
                    text: '• Symptôme : Boutons qui collent.\n• Solution : Ouvrir et nettoyer la membrane silicone avec de l\'alcool.'
                },
                'touchpad': {
                    title: 'Pavé Tactile',
                    text: '• Symptôme : Pas de clic.\n• Solution : Rebrancher la nappe flexible interne au centre de la manette.'
                }
            };
 
            window.showInstructions = function(title, text) {
                document.querySelector('#info-title').innerText = title;
                document.querySelector('#info-text').innerText = text;
                document.querySelector('#info-display').style.display = 'block';
                if(sndClick) {
                    sndClick.currentTime = 0;
                    sndClick.play();
                }
            };
 
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
 
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
               
                raycaster.setFromCamera(mouse, camera.getObject3D('camera'));
                const hotspots = document.querySelectorAll('.hotspot');
                const objects = Array.from(hotspots).map(h => h.object3D);
                const intersects = raycaster.intersectObjects(objects, true);
 
                if (intersects.length > 0) {
                    const id = intersects[0].object.el.getAttribute('data-id');
                    const guide = repairGuides[id];
                    showInstructions(guide.title, guide.text);
                    mode = null;
                } else {
                    lastX = e.clientX; lastY = e.clientY;
                    mode = 'rotate';
                }
            });
 
            let mode = null; let lastX = 0, lastY = 0;
            document.addEventListener('mouseup', () => { mode = null; });
            document.addEventListener('mousemove', (e) => {
                if (mode !== 'rotate') return;
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                controllerGroup.object3D.rotation.y += dx * 0.007;
                controllerGroup.object3D.rotation.x += dy * 0.007;
                lastX = e.clientX; lastY = e.clientY;
            });
 
            canvas.addEventListener('wheel', (e) => {
                const pos = camera.object3D.position;
                pos.z = Math.max(0.4, Math.min(3, pos.z + e.deltaY * 0.001));
            }, { passive: false });
 
            document.querySelector('#reset-btn').addEventListener('click', () => {
                controllerGroup.object3D.rotation.set(0, 0, 0);
                document.querySelector('#info-display').style.display = 'none';
            });
        });
    </script>
</body>
</html>
