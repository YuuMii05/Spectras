<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>scene AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
      <a-camera cursor="rayOrigin: mouse" raycaster="objects: .clickable" position="0 1.6 0"></a-camera>
    <a-sky color="#545454"></a-sky>
    <a-box id="box" position="0 1 -3" color="red"  class="clickable"></a-box>
  </a-scene>
</body>
<script>
const button = document.querySelector('#box');
button.addEventListener('click',function() {
  alert("clique effectuer");
  button.setAttribute('color', '#F02B02');
});
</script>
</html>
