<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Immatech - PS5 Pro Viewer</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene background="color: #d6d6d6" 
             renderer="antialias: true; colorManagement: true; exposure: 1.2; toneMapping: ACESFilmic;"
             vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="ps5" src="assets/ps5.glb"></a-asset-item>
        </a-assets>

        <!-- Pas de cursor, pas de look-controls -->
        <a-camera position="0 0 1" fov="45" 
                  look-controls-enabled="false" 
                  wasd-controls-enabled="false">
        </a-camera>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 3 2" intensity="1" color="#ffffff"></a-light>
        <a-light type="directional" position="-1 -1 -2" intensity="0.5" color="#ffffff"></a-light>

        <a-entity
          id="controller"
          gltf-model="#ps5"
          position="0 0 0"
          scale="8 8 8">
        </a-entity>

    </a-scene>

    <!-- Légende -->
    <div style="position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
                background:rgba(0,0,0,0.45); color:#fff; font-family:sans-serif;
                font-size:13px; padding:8px 18px; border-radius:20px; pointer-events:none;
                display:flex; gap:20px; white-space:nowrap;">
        <span>🎮 Clic manette → Rotation</span>
        <span>🖱️ Clic fond → Déplacer</span>
        <span>⚙️ Molette → Zoom</span>
    </div>

    <script>
        // On attend que la scène soit prête
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {

            const controller = document.querySelector('#controller');
            const camera = document.querySelector('a-camera');
            const canvas = scene.canvas;

            // --- Raycaster pour savoir si on clique sur la manette ---
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let threeCamera = null;

            function getThreeCamera() {
                if (!threeCamera) {
                    threeCamera = camera.getObject3D('camera');
                }
                return threeCamera;
            }

            function isHittingController(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, getThreeCamera());
                const intersects = raycaster.intersectObject(controller.object3D, true);
                return intersects.length > 0;
            }

            // --- État ---
            let mode = null; // 'rotate' | 'pan'
            let lastX = 0, lastY = 0;
            let vX = 0, vY = 0;
            let animFrame = null;

            // --- Inertie rotation ---
            function applyInertia() {
                if (mode !== 'rotate') {
                    vX *= 0.95;
                    vY *= 0.95;
                    controller.object3D.rotation.y += vY;
                    controller.object3D.rotation.x += vX;
                    if (Math.abs(vX) > 0.0001 || Math.abs(vY) > 0.0001) {
                        animFrame = requestAnimationFrame(applyInertia);
                    }
                }
            }

            // --- Mouse ---
            canvas.addEventListener('mousedown', (e) => {
                lastX = e.clientX;
                lastY = e.clientY;
                if (isHittingController(e.clientX, e.clientY)) {
                    mode = 'rotate';
                    cancelAnimationFrame(animFrame);
                    vX = 0; vY = 0;
                } else {
                    mode = 'pan';
                }
            });

            document.addEventListener('mouseup', () => {
                if (mode === 'rotate') {
                    animFrame = requestAnimationFrame(applyInertia);
                }
                mode = null;
            });

            document.addEventListener('mousemove', (e) => {
                if (!mode) return;
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;

                if (mode === 'rotate') {
                    vY = dx * 0.007;
                    vX = dy * 0.007;
                    controller.object3D.rotation.y += vY;
                    controller.object3D.rotation.x += vX;
                } else if (mode === 'pan') {
                    controller.object3D.position.x += dx * 0.003;
                    controller.object3D.position.y -= dy * 0.003;
                }

                lastX = e.clientX;
                lastY = e.clientY;
            });

            // --- Molette zoom ---
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const pos = camera.object3D.position;
                pos.z = Math.max(0.3, Math.min(4, pos.z + e.deltaY * 0.001));
            }, { passive: false });

            // --- Touch ---
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                lastX = t.clientX;
                lastY = t.clientY;
                if (isHittingController(t.clientX, t.clientY)) {
                    mode = 'rotate';
                    cancelAnimationFrame(animFrame);
                    vX = 0; vY = 0;
                } else {
                    mode = 'pan';
                }
            }, { passive: false });

            document.addEventListener('touchend', () => {
                if (mode === 'rotate') {
                    animFrame = requestAnimationFrame(applyInertia);
                }
                mode = null;
            });

            document.addEventListener('touchmove', (e) => {
                if (!mode) return;
                const t = e.touches[0];
                const dx = t.clientX - lastX;
                const dy = t.clientY - lastY;

                if (mode === 'rotate') {
                    vY = dx * 0.007;
                    vX = dy * 0.007;
                    controller.object3D.rotation.y += vY;
                    controller.object3D.rotation.x += vX;
                } else if (mode === 'pan') {
                    controller.object3D.position.x += dx * 0.003;
                    controller.object3D.position.y -= dy * 0.003;
                }

                lastX = t.clientX;
                lastY = t.clientY;
            });

        });
    </script>

</body>
</html>
