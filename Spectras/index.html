<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Spectras - PS5 Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="js/gameplay.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

  <a-scene
    background="color: #d6d6d6"
    renderer="antialias: true; colorManagement: true; exposure: 1.2; toneMapping: ACESFilmic;"
    vr-mode-ui="enabled: false"
    orbit-controls-manager
  >
    <a-assets>
      <a-asset-item id="ps5" src="assets/ps5.glb"></a-asset-item>
    </a-assets>

    <a-entity id="cameraRig" position="0 0 0">
      <a-camera id="mainCamera" position="0 0 3" fov="45"></a-camera>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="1 3 2" intensity="1"></a-light>
    <a-light type="directional" position="-1 -1 -2" intensity="0.5"></a-light>

    <!-- parent commun -->
    <a-entity
      id="controllerRoot"
      position="0 0 0"
      rotation="0 0 0"
      scale="8 8 8"
      ps5-hotspots
    >
      <a-entity
        id="controllerModel"
        gltf-model="#ps5"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1"
      ></a-entity>
    </a-entity>

  </a-scene>

</body>
</html>
